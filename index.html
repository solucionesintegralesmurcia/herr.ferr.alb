<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferretería Albaladejo — Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--orange:#FF4D00;--dark:#111;--card:#191919;--border:#2a2a2a;
--text:#f0f0f0;--muted:#777;--green:#00c853;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0a0a0a;color:#fff}

/* HERO */
.hero{padding:12px;border-bottom:2px solid var(--orange);text-align:center}
.hero h1{font-family:'Bebas Neue';font-size:28px}
.hero span{color:var(--orange)}

/* GRID */
.grid{padding:14px;display:flex;flex-direction:column;gap:14px;max-width:700px;margin:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.card.selected{border-color:var(--orange)}
.name{font-family:'Bebas Neue';font-size:22px}
.desc{font-size:13px;color:var(--muted)}
.price{font-size:26px;color:var(--orange);margin:6px 0}

/* QTY */
.qty{display:flex;gap:10px;align-items:center}
.qty button{width:40px;height:40px;font-size:20px;background:none;border:none;color:white}
.qty span{font-size:18px}

/* CART */
.cart{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid var(--orange);padding:10px;display:flex;justify-content:space-between}
.btn{background:#25D366;color:white;border:none;padding:10px 16px;border-radius:10px}

/* ADMIN */
.admin{padding:20px;max-width:800px;margin:auto}
input{width:100%;margin:4px 0;padding:6px;background:#222;border:1px solid #333;color:#fff}
</style>
</head>

<body>

<div id="tiendaView"></div>
<div id="adminView" style="display:none;"></div>

<script>

/* DETECTAR ADMIN */
const isAdmin = new URLSearchParams(window.location.search).get('admin') === '1';

/* STORAGE */
let productos = JSON.parse(localStorage.getItem('ferro_productos')||'null')||[
{id:1,nombre:'WD-40',ref:'WD1',desc:'Lubricante',venta:7.5,stock:10},
{id:2,nombre:'Guantes',ref:'GL2',desc:'Protección',venta:1.3,stock:50}
];

let cantidades={};

/* GUARDAR */
function saveAll(){
localStorage.setItem('ferro_productos',JSON.stringify(productos));
}

/* TIENDA */
function renderTienda(){
const wrap=document.getElementById('tiendaView');

wrap.innerHTML=`
<div class="hero">
<h1>FERRETERÍA <span>ALBALADEJO</span></h1>
</div>

<div class="grid" id="grid"></div>

<div class="cart">
<div id="total">0€</div>
<button class="btn" onclick="enviar()">WhatsApp</button>
</div>

<button onclick="location.href='?admin=1'" style="margin:20px auto;display:block">···</button>
`;

const grid=document.getElementById('grid');

productos.forEach(p=>{
const q=cantidades[p.id]||0;

grid.innerHTML+=`
<div class="card ${q>0?'selected':''}">
<div class="name">${p.nombre}</div>
<div class="desc">${p.desc}</div>
<div class="price">${p.venta}€</div>

<div class="qty">
<button onclick="cambiar(${p.id},-1)">-</button>
<span>${q}</span>
<button onclick="cambiar(${p.id},1)">+</button>
</div>
</div>
`;
});

updateCart();
}

function cambiar(id,d){
let q=cantidades[id]||0;
q+=d;
if(q<0)q=0;
cantidades[id]=q;
renderTienda();
}

function updateCart(){
let total=0;
productos.forEach(p=>{
total+=(cantidades[p.id]||0)*p.venta;
});
document.getElementById('total').innerText=total.toFixed(2)+'€';
}

function enviar(){
let msg='Pedido:\n';
productos.forEach(p=>{
let q=cantidades[p.id]||0;
if(q>0) msg+=q+'x '+p.nombre+'\n';
});
window.open('https://wa.me/?text='+encodeURIComponent(msg));
}

/* ADMIN */
function renderAdmin(){
const wrap=document.getElementById('adminView');

wrap.innerHTML=`
<div class="admin">
<h2>Panel Admin</h2>

<button onclick="add()">➕ Añadir</button>

<div id="list"></div>

<button onclick="reset()">RESET</button>
</div>
`;

renderAdminList();
}

function renderAdminList(){
const list=document.getElementById('list');

list.innerHTML=productos.map((p,i)=>`
<div>
<input value="${p.nombre}" onchange="edit(${i},'nombre',this.value)">
<input value="${p.desc}" onchange="edit(${i},'desc',this.value)">
<input type="number" value="${p.venta}" onchange="edit(${i},'venta',this.value)">
<input type="number" value="${p.stock}" onchange="edit(${i},'stock',this.value)">
<button onclick="del(${i})">X</button>
</div>
`).join('');
}

function edit(i,k,v){
productos[i][k]=k==='venta'||k==='stock'?parseFloat(v):v;
saveAll();
}

function del(i){
productos.splice(i,1);
saveAll();
renderAdminList();
}

function add(){
productos.push({id:Date.now(),nombre:'Nuevo',desc:'',venta:0,stock:0});
saveAll();
renderAdminList();
}

function reset(){
localStorage.clear();
location.reload();
}

/* INIT */
if(isAdmin){
document.getElementById('tiendaView').style.display='none';
document.getElementById('adminView').style.display='block';
renderAdmin();
}else{
renderTienda();
}

</script>

</body>
</html>
