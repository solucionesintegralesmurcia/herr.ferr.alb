<script>

// 🔒 ANTI-PANTALLA NEGRA GLOBAL
window.addEventListener('error', e => {
  console.error("ERROR JS:", e.message);
});

// ── URL PARAMS ─────────────────────
const urlParams = new URLSearchParams(window.location.search);
const comercialId = urlParams.get('c') || '';
const comercialNombre = urlParams.get('n') ? decodeURIComponent(urlParams.get('n')) : '';

const heroCom = document.getElementById('heroComercial');
if (heroCom && comercialNombre) {
  heroCom.textContent = '👤 Comercial: ' + comercialNombre;
}

// ── CONFIG (FIX CRÍTICO) ───────────
let config;
try {
  config = JSON.parse(localStorage.getItem('ferro_config')) || {};
} catch {
  config = {};
}

config = Object.assign({
  wa:'34622663157',
  iva:0,
  envioGlobal:false,
  flashActiva:false,
  flashTitulo:'',
  flashDesc:'',
  flashInicio:'',
  flashFin:'',
  nombre:'FERRETERÍA ALBALADEJO',
  sub:'Selecciona y reserva por WhatsApp',
  logo:null
}, config);

// ── PRODUCTOS (FIX CRÍTICO) ────────
let productos;
try {
  productos = JSON.parse(localStorage.getItem('ferro_productos'));
} catch {
  productos = null;
}

productos = productos || [
  {id:1,nombre:'WD-40 500ml',ref:'WD-001',emoji:'🛢️',desc:'Lubricante multiusos profesional. Precio por caja.',coste:5.20,venta:7.50,badge:'oferta',precioAntes:8.90,nota:'caja 12 uds',ventas:0,stock:0,vendidosHoy:0,envio:'si',modoQty:'presets',presets:[12,24,48],qtyMin:1,qtyStep:1,foto:null,esFlash:false,flashInicio:'',flashFin:'',flashTexto:''},
  {id:2,nombre:'Guantes piel',ref:'GLV-002',emoji:'🧤',desc:'Guantes de protección en piel resistente.',coste:0.80,venta:1.35,badge:'stock',precioAntes:null,nota:'',ventas:0,stock:150,vendidosHoy:0,envio:'',modoQty:'libre',presets:[],qtyMin:1,qtyStep:1,foto:null,esFlash:false,flashInicio:'',flashFin:'',flashTexto:''}
];

let pedidos;
try {
  pedidos = JSON.parse(localStorage.getItem('ferro_pedidos')) || [];
} catch {
  pedidos = [];
}

let cantidades = {};

// ── HERO (PROTEGIDO) ───────────────
function initHero() {
  const title = document.getElementById('heroTitle');
  const sub = document.getElementById('heroSub');
  const wrap = document.getElementById('heroLogoWrap');

  if (!title || !sub || !wrap) return;

  const n = (config.nombre || '').toUpperCase();
  const parts = n.split(' ');
  const last = parts.pop();

  title.innerHTML = parts.join(' ') + ' <span>' + last + '</span>';
  sub.textContent = config.sub || '';

  wrap.innerHTML = config.logo
    ? '<img class="hero-logo" src="' + config.logo + '">'
    : '<div class="hero-logo-placeholder">🔧</div>';
}

// ── RENDER (PROTEGIDO) ─────────────
function renderTienda() {
  const grid = document.getElementById('productosGrid');
  if (!grid) return;

  grid.innerHTML = '';

  productos.forEach(p => {
    const qty = cantidades[p.id] || 0;

    grid.innerHTML += `
      <div class="producto-card ${qty>0?'selected':''}">
        <div class="card-body">
          <div class="card-ref">${p.ref}</div>
          <div class="card-name">${p.nombre}</div>
          <div class="card-desc">${p.desc}</div>

          <div class="card-pricing">
            <span class="price-main">${p.venta}€</span>
          </div>

          <div class="qty-row">
            <button class="qty-btn" onclick="cambiarQty(${p.id},-1)">−</button>
            <span>${qty}</span>
            <button class="qty-btn" onclick="cambiarQty(${p.id},1)">+</button>
          </div>
        </div>
      </div>
    `;
  });

  updateCart();
}

// ── QTY ───────────────────────────
function cambiarQty(id, delta){
  let q = cantidades[id] || 0;
  q += delta;
  if (q < 0) q = 0;
  cantidades[id] = q;
  renderTienda();
}

// ── CART ──────────────────────────
function updateCart(){
  let total = 0;
  let items = 0;

  productos.forEach(p=>{
    const q = cantidades[p.id] || 0;
    total += q * p.venta;
    items += q;
  });

  const t = document.getElementById('cartTotal');
  const i = document.getElementById('cartItems');

  if (t) t.textContent = total.toFixed(2)+"€";
  if (i) i.textContent = items+" productos";
}

// ── WHATSAPP ──────────────────────
function enviarWhatsApp(){
  const nombre = document.getElementById('clienteNombre')?.value || 'Cliente';
  let msg = 'Pedido:\n';

  productos.forEach(p=>{
    const q = cantidades[p.id] || 0;
    if(q>0) msg += q + "x " + p.nombre + "\n";
  });

  window.open('https://wa.me/'+config.wa+'?text='+encodeURIComponent(msg));
}

// ── INIT ──────────────────────────
initHero();
renderTienda();

</script>
