<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferretería Albaladejo — Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --orange:#FF4D00; --yellow:#FFB800;
  --dark:#111; --darker:#0a0a0a; --mid:#1e1e1e;
  --card:#191919; --border:#2a2a2a; --text:#f0f0f0;
  --muted:#777; --green:#00c853;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--darker);color:var(--text);}

/* HERO */
.hero{padding:12px;background:#111;border-bottom:2px solid var(--orange);}
.hero h1{font-family:'Bebas Neue';font-size:28px;}
.hero span{color:var(--orange);}

/* GRID */
.productos-grid{padding:16px;display:flex;flex-direction:column;gap:12px;}
.producto-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
.card-name{font-size:20px;font-family:'Bebas Neue';}
.price-main{color:var(--orange);font-size:22px;}

/* CART */
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:2px solid var(--orange);padding:12px;display:flex;justify-content:space-between;}
</style>
</head>

<body>

<div class="hero">
  <h1>FERRETERÍA <span>ALBALADEJO</span></h1>
</div>

<div class="productos-grid" id="productosGrid"></div>

<div class="cart-bar">
  <div id="cartTotal">0,00€</div>
  <button onclick="enviarWhatsApp()">Reservar</button>
</div>

<script>
/* CONFIG SEGURA */
let config;
try {
  config = JSON.parse(localStorage.getItem('ferro_config')) || {};
} catch(e) { config = {}; }

config = Object.assign({
  wa:'34622663157'
}, config);

/* PRODUCTOS SEGUROS */
let productos;
try {
  productos = JSON.parse(localStorage.getItem('ferro_productos'));
} catch(e) { productos = null; }

if (!Array.isArray(productos)) {
  productos = [
    {id:1,nombre:'WD-40 500ml',venta:7.5},
    {id:2,nombre:'Guantes piel',venta:1.35},
    {id:3,nombre:'Ventilador',venta:64}
  ];
}

let cantidades = {};

/* RENDER ROBUSTO */
function renderTienda(){
  const grid=document.getElementById('productosGrid');
  if(!grid) return;

  grid.innerHTML='';

  productos.forEach(p=>{
    try{
      const qty=cantidades[p.id]||0;
      const precio=(p.venta||0).toFixed(2).replace('.',',');

      grid.innerHTML+=`
      <div class="producto-card">
        <div class="card-name">${p.nombre||''}</div>
        <div class="price-main">${precio}€</div>
        <button onclick="sumar(${p.id})">+</button>
        <button onclick="restar(${p.id})">-</button>
        <div>${qty}</div>
      </div>`;
    }catch(e){
      console.error("Error producto",p,e);
    }
  });

  updateCart();
}

function sumar(id){
  cantidades[id]=(cantidades[id]||0)+1;
  renderTienda();
}

function restar(id){
  cantidades[id]=(cantidades[id]||0)-1;
  if(cantidades[id]<0) cantidades[id]=0;
  renderTienda();
}

function updateCart(){
  let total=0;
  productos.forEach(p=>{
    total += (cantidades[p.id]||0)*(p.venta||0);
  });

  document.getElementById('cartTotal').textContent =
    total.toFixed(2).replace('.',',') + '€';
}

function enviarWhatsApp(){
  const msg="Pedido desde web";
  window.open("https://wa.me/"+config.wa+"?text="+encodeURIComponent(msg),"_blank");
}

/* INIT */
document.addEventListener("DOMContentLoaded",renderTienda);
</script>

</body>
</html>
